<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(content=~{::#content}, title=~{::title}, script=~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${loggedInUser.name} + ' | Profile'">Profile Page</title>
    <link rel="stylesheet" data-th-href="@{/css/output.css}">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet" />
</head>
<body>
<div id="content">
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <div th:if="${loggedInUser}">
        <div class="max-w-4xl px-4 py-10 mt-16 mb-10 sm:px-6 lg:px-8 mx-auto">
            <div class="bg-white rounded-xl shadow-xs p-4 sm:p-7 dark:bg-gray-800">
                <div data-th-replace="~{message :: messagebox}"></div>
                <div class="mb-8">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-neutral-200">Profile</h2>
                    <p class="text-sm text-gray-600 dark:text-neutral-400">Manage your name, password and account settings.</p>
                </div>

                

                    <div class="grid sm:grid-cols-12 gap-2 sm:gap-6">
                        <!-- Profile Photo -->
                        <div class="sm:col-span-3">
                            <label class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Profile photo</label>
                        </div>
                        <div class="sm:col-span-9">
                            <div class="flex items-center gap-5">
                                <img th:src="${loggedInUser.displayProfilePic}" src="/images/default-avatar.svg" onerror="this.onerror=null; this.src='/images/default-avatar.svg';" class="inline-block size-36 rounded-full ring-2 ring-white dark:ring-neutral-900 object-cover">
                                <div class="flex gap-x-2">
                                   
                                        <label for="profilePic" class="py-2 px-3 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 dark:bg-transparent dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800">Upload file</label>
                                            <input type="file" name="profilePic" id="profilePic" class="hidden">
                                        </label>
                                    
                                </div>
                            </div>
                        </div>

                        <!-- Full Name -->
                        <div class="sm:col-span-3">
                            <label for="name" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Full name</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:value="${loggedInUser.name}" id="name" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400" readonly>
                        </div>

                        <!-- Email -->
                        <div class="sm:col-span-3">
                            <label for="email" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Email</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:value="${loggedInUser.email}" id="email" type="email" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400" readonly>
                        </div>

                        <!-- Phone -->
                        <div class="sm:col-span-3">
                            <label for="phone" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Phone</label>
                            <span class="text-sm text-gray-400 dark:text-neutral-600">(Optional)</span>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:value="${loggedInUser.phoneNumber}" id="phone" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400" readonly>
                        </div>

                        <!-- Gender -->
                        <div class="sm:col-span-3">
                            <label class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Gender</label>
                        </div>
                        <div class="sm:col-span-9">
          <div class="sm:flex">
            <label for="af-account-gender-checkbox" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
              <input type="radio" name="af-account-gender-checkbox" th:checked="${loggedInUser.gender == 'Male'}" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="af-account-gender-checkbox"  readonly>
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Male</span>
            </label>

            <label for="af-account-gender-checkbox-female" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
              <input type="radio" name="af-account-gender-checkbox" th:checked="${loggedInUser.gender == 'Female'}" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="af-account-gender-checkbox-female" readonly>
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Female</span>
            </label>

            <label for="af-account-gender-checkbox-other" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600">
              <input type="radio" name="af-account-gender-checkbox" th:checked="${loggedInUser.gender == null}" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 disabled:opacity-50 disabled:pointer-events-none dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800" id="af-account-gender-checkbox-other" readonly>
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Other</span>
            </label>
          </div>
        </div>

                        <!-- Bio -->
                        <div class="sm:col-span-3">
                            <label for="bio" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Provider :</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:value="${loggedInUser.provider}" id="provider" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400" readonly>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="mt-5 flex justify-end gap-x-2">
                        <a data-th-href="@{/user/profile/view/{id}(id=${loggedInUser.userId})}" class="py-2 px-3 text-sm font-medium rounded-lg border border-transparent bg-blue-600 text-white hover:bg-blue-700">
                             Update
                        </a>


                    </div>
                
            </div>
        </div>
    </div>
</div>

<script>
    console.log("profile page");
</script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>
</html>
