<!DOCTYPE html>
<html
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title data-th-text="${loggedInUser.name}+' |  feedback'">
      feed back
    </title>
  </head>
  <body>
    <div id="content">
      <!-- sidebar -->

      <!-- user is logged in : sidebar -->

      <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
      </div>


<!-- Hire Us -->
<div class="max-w-[85rem] px-4 py-10 mt-14 sm:px-6 lg:px-8 lg:py-14 mx-auto">
  <!-- Grid -->
  <div class="grid md:grid-cols-2 items-center gap-12">
    <div>
      <h1 class="text-3xl font-bold text-gray-800 sm:text-4xl lg:text-5xl lg:leading-tight dark:text-white">
        Give us feed back
      </h1>
      <p class="mt-1 md:text-lg text-gray-800 dark:text-neutral-200">
        Help us to make the experience better for you by letting us know what you think.
      </p>

      <div class="mt-8">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-neutral-200">
          Why its important?
        </h2>

        <ul class="mt-2 space-y-2">
          <li class="flex gap-x-3">
            <svg class="shrink-0 mt-0.5 size-5 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span class="text-gray-600 dark:text-neutral-400">
              Industry-leading design
            </span>
          </li>

          <li class="flex gap-x-3">
            <svg class="shrink-0 mt-0.5 size-5 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span class="text-gray-600 dark:text-neutral-400">
              Better connection with user
            </span>
          </li>

          <li class="flex gap-x-3">
            <svg class="shrink-0 mt-0.5 size-5 text-gray-600 dark:text-neutral-400" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span class="text-gray-600 dark:text-neutral-400">
              Simple and convinient UI
            </span>
          </li>
        </ul>
      </div>

      <!-- Brands -->
      <div class="mt-8">
        <h2 class="text-lg font-semibold text-gray-800 dark:text-neutral-200">
          Created by:
        </h2>

        <div class="mt-4 flex gap-x-8">
            <img src="https://i.imghippo.com/files/FONQ1485AsQ.png" class="w-16 h-8" alt="" border="0">
            <img src="https://i.imghippo.com/files/XGS2616PU.png" class="w-16 h-8" alt="" border="0">
            <img src="https://i.imghippo.com/files/TUiH7800tx.png" class="w-16 h-8" alt="" border="0">
            <img src="https://i.imghippo.com/files/Uxr2243iIg.png" class="w-16 h-8" alt="" border="0">
            <img src="https://i.imghippo.com/files/tDI6672uEY.png" class="w-16 h-8" alt="" border="0">
            <img src="https://i.imghippo.com/files/sQD4190GiQ.png" class="w-16 h-8" alt="" border="0">
        </div>
      </div>
      <!-- End Brands -->

      
    </div>
    <!-- End Col -->

    <div class="relative">
      <!-- Card -->
      <div class="flex flex-col border border-gray-200 rounded-xl p-4 sm:p-6 lg:p-10 dark:border-neutral-700">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-neutral-200">
          Fill in the form
        </h2>

        <form method="POST" th:action="@{/submit-feedback}">
  <div class="mt-6 grid gap-4 lg:gap-6">
    
    <div>
      <label for="name" class="block mb-2 text-sm text-gray-700 font-medium dark:text-white">First Name</label>
      <input type="text" name="name" id="name" required
             class="py-2.5 sm:py-3 px-4 block w-full border-gray-200 rounded-lg sm:text-sm
                    focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none
                    dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500
                    dark:focus:ring-neutral-600">
    </div>

    <div>
      <label for="email" class="block mb-2 text-sm text-gray-700 font-medium dark:text-white">Your Email</label>
      <input type="email" name="email" id="email" required
             class="py-2.5 sm:py-3 px-4 block w-full border-gray-200 rounded-lg sm:text-sm
                    focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none
                    dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500
                    dark:focus:ring-neutral-600">
    </div>

    <div>
      <label for="review" class="block mb-2 text-sm text-gray-700 font-medium dark:text-white">Review</label>
      <textarea name="review" id="review" rows="4" required
                class="py-2.5 sm:py-3 px-4 block w-full border-gray-200 rounded-lg sm:text-sm
                       focus:border-blue-500 focus:ring-blue-500 disabled:opacity-50 disabled:pointer-events-none
                       dark:bg-neutral-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500
                       dark:focus:ring-neutral-600"></textarea>
    </div>

    <div class="grid grid-cols-1 mt-7 sm:grid-cols-2 gap-4 lg:gap-6">
              <div>
                <label for="hs-company-hire-us-1" class="block mb-2 text-sm text-gray-700 font-medium dark:text-white">How much will you rate this webapp ?</label>
<div class="flex flex-row-reverse justify-end space-x-reverse space-x-1 rtl:space-x-1">
  <input type="radio" id="star5" name="rating" value="5" class="hidden peer/star5">
  <label for="star5" class="text-3xl cursor-pointer peer-checked/star5:text-purple-700">&#9733;</label>

  <input type="radio" id="star4" name="rating" value="4" class="hidden peer/star4">
  <label for="star4" class="text-3xl cursor-pointer peer-checked/star4:text-purple-700 peer-checked/star5:text-purple-700">&#9733;</label>

  <input type="radio" id="star3" name="rating" value="3" class="hidden peer/star3">
  <label for="star3" class="text-3xl cursor-pointer peer-checked/star3:text-purple-700 peer-checked/star4:text-purple-700 peer-checked/star5:text-purple-700">&#9733;</label>

  <input type="radio" id="star2" name="rating" value="2" class="hidden peer/star2">
  <label for="star2" class="text-3xl cursor-pointer peer-checked/star2:text-purple-700 peer-checked/star3:text-purple-700 peer-checked/star4:text-purple-700 peer-checked/star5:text-purple-700">&#9733;</label>

  <input type="radio" id="star1" name="rating" value="1" class="hidden peer/star1">
  <label for="star1" class="text-3xl cursor-pointer peer-checked/star1:text-purple-700 peer-checked/star2:text-purple-700 peer-checked/star3:text-purple-700 peer-checked/star4:text-purple-700 peer-checked/star5:text-purple-700">&#9733;</label>
</div>


    </div>
     </div>
            </div>

    <div>

 <!-- Checkbox -->
        <div class="mt-3 flex">
          <div class="flex">
            <input id="remember-me" name="remember-me" type="checkbox" class="shrink-0 mt-1.5 border-gray-200 rounded-sm text-blue-600 focus:ring-blue-500 dark:bg-neutral-800 dark:border-neutral-700 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800">
          </div>
          <div class="ms-3">
            <label for="remember-me" class="text-sm text-gray-600 dark:text-neutral-400">By submitting this form I have read and acknowledged the <a class="text-blue-600 decoration-2 hover:underline focus:outline-hidden focus:underline font-medium dark:text-blue-500" href="#">Privacy policy</a></label>
          </div>
        </div>
        <!-- End Checkbox -->


    


      <button type="submit" class="outline-none border-none mt-7 ml-28 items-center flex flex-col w-full max-w-[321px] h-[50px] rounded-md shadow-[0_10px_16px_rgba(30,143,255,0.35)] overflow-hidden transition-all duration-[600ms] ease-[cubic-bezier(0.16,1,0.3,1)] hover:shadow-[0_10px_16px_rgba(33,220,98,0.35)] active:scale-95 group">
  <div class="transform translate-y-0 w-full transition-all duration-[600ms] ease-[cubic-bezier(0.16,1,0.3,1)] group-hover:-translate-y-[50px]">
    <div class="bg-[#1e90ff] flex items-center justify-between h-[50px] px-[1.125em] py-[0.75em]">
      <p class="text-white pl-28 font-bold text-[17px]">Submit</p>
    </div>
    <div class="bg-[#21dc62] flex items-center justify-between h-[50px] px-[1.125em] py-[0.75em]">
      <p class="text-white pl-28 font-bold text-[17px]">Thanks</p>
    </div>
  </div>
</button>
    </div>
  </div>
</form>

        <!-- End Grid -->


              </div>
            </div>
            <!-- End Grid -->

       
       
      </div>
      <!-- End Card -->
       </form>
    </div>
    <!-- End Col -->
  </div>
  <!-- End Grid -->
</div>
<!-- End Hire Us -->



     </div>

    <script>
      console.log("this is profile page");
    </script>
  </body>
</html>
