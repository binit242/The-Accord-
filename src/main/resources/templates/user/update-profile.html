<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(content=~{::#content}, title=~{::title}, script=~{::script})}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${loggedInUser.name} + ' | Update Profile'">Update Profile</title>
    <link rel="stylesheet" data-th-href="@{/css/output.css}">
    <link href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css" rel="stylesheet" />
</head>
<body>
<div id="content" class="user-profile-page user-edit-profile-page">
    <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
    </div>

    <div th:if="${loggedInUser}">

    


        
        <div class="user-profile-shell max-w-4xl px-4 py-10 mt-16 mb-10 sm:px-6 lg:px-8 mx-auto">
            <form th:action="@{/user/profile/update/{userId}(userId=${userId})}" th:object="${userForm}" method="post" enctype="multipart/form-data" class="user-profile-card bg-white rounded-xl shadow-xs p-4 sm:p-7 dark:bg-gray-800">
                <div class="user-page-heading mb-8">
                    <h2 class="text-xl font-bold text-gray-800 dark:text-neutral-200">Update Profile</h2>
                    <p class="text-sm text-gray-600 dark:text-neutral-400">Edit your name, password and account settings.</p>
                </div>

                

                    <div class="grid sm:grid-cols-12 gap-2 sm:gap-6">
                        <!-- Profile Photo -->
                        <div class="sm:col-span-3">
                            <label class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Profile photo</label>
                        </div>
                        <div class="sm:col-span-9">
                            <div class="flex items-center gap-5">
                                <img th:if="${profilePicUrl != null}" th:src="${profilePicUrl}" src="/images/default-avatar.svg" onerror="this.onerror=null; this.src='/images/default-avatar.svg';" class="inline-block size-36 rounded-full ring-2 ring-white dark:ring-neutral-900 object-cover" alt="Profile Pic">
                                <div class="flex gap-x-2">
                                   
                                        <label for="profilePic" class="py-2 px-3 text-sm font-medium rounded-lg border border-gray-200 bg-white text-gray-800 shadow-2xs hover:bg-gray-50 dark:bg-transparent dark:border-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-800 cursor-pointer">Upload file</label>
                                            <input type="file" name="profilePic" id="profilePic" th:field="*{profilePic}" accept="image/*" class="hidden">
                                        </label>
                                    
                                </div>
                            </div>
                        </div>

                        <!-- Full Name -->
                        <div class="sm:col-span-3">
                            <label for="name" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Full name</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:field="*{name}" id="name" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400">
                        </div>

                        <!-- Email -->
                        <div class="sm:col-span-3">
                            <label for="email" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Email</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:field="*{email}" id="email" type="email" th:readonly="${oauthProfile}" th:classappend="${oauthProfile} ? ' cursor-not-allowed opacity-75' : ''" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400">
                            <p th:if="${oauthProfile}" class="mt-1 text-xs text-gray-500 dark:text-neutral-400">Provider login uses this email as your account identity. You can still edit your name, phone, gender and profile image.</p>
                        </div>

                        <!-- Phone -->
                        <div class="sm:col-span-3">
                            <label for="phone" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Phone</label>
                            <span class="text-sm text-gray-400 dark:text-neutral-600">(Optional)</span>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:field="*{phoneNumber}" id="phoneNumber" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400">
                        </div>

                        <!-- Gender -->
                        <div class="sm:col-span-3">
                            <label class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Gender</label>
                        </div>
                        <div class="sm:col-span-9">
          <div class="sm:flex">
            <label for="af-account-gender-checkbox" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600 cursor-pointer">
              <input type="radio" name="gender" th:field="*{gender}" value="Male" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800 cursor-pointer" id="af-account-gender-checkbox">
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Male</span>
            </label>

            <label for="af-account-gender-checkbox-female" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600 cursor-pointer">
              <input type="radio" name="gender" th:field="*{gender}" value="Female" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800 cursor-pointer" id="af-account-gender-checkbox-female">
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Female</span>
            </label>

            <label for="af-account-gender-checkbox-other" class="flex py-2 px-3 w-full border border-gray-200 shadow-2xs -mt-px -ms-px first:rounded-t-lg last:rounded-b-lg sm:first:rounded-s-lg sm:mt-0 sm:first:ms-0 sm:first:rounded-se-none sm:last:rounded-es-none sm:last:rounded-e-lg text-sm relative focus:z-10 focus:border-blue-500 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400 dark:placeholder-neutral-500 dark:focus:ring-neutral-600 cursor-pointer">
              <input type="radio" name="gender" th:field="*{gender}" value="Other" class="shrink-0 mt-0.5 border-gray-300 rounded-full text-blue-600 focus:ring-blue-500 checked:border-blue-500 dark:bg-gray-900 dark:border-neutral-500 dark:checked:bg-blue-500 dark:checked:border-blue-500 dark:focus:ring-offset-gray-800 cursor-pointer" id="af-account-gender-checkbox-other">
              <span class="sm:text-sm text-gray-500 ms-3 dark:text-neutral-400">Other</span>
            </label>
          </div>
        </div>

                        <!-- Bio -->
                        <div class="sm:col-span-3">
                            <label for="bio" class="inline-block text-sm text-gray-800 mt-2.5 dark:text-neutral-200">Provider :</label>
                        </div>
                        <div class="sm:col-span-9">
                            <input th:value="${loggedInUser.provider}" id="provider" type="text" class="w-full px-3 py-2 border border-gray-200 rounded-lg shadow-2xs dark:bg-gray-900 dark:border-neutral-700 dark:text-neutral-400">
                        </div>
                    </div>

                    <div id="profileCropPanel" class="hidden mt-6 rounded-lg border border-gray-200 bg-gray-50 p-4 dark:bg-gray-900 dark:border-neutral-700">
                        <div class="flex flex-col md:flex-row gap-5 items-start">
                            <div class="w-full md:w-auto">
                                <canvas id="profileCropCanvas" width="320" height="320" class="w-full max-w-80 aspect-square rounded-lg bg-black shadow"></canvas>
                            </div>
                            <div class="w-full flex-1 space-y-4">
                                <div>
                                    <label for="profileZoom" class="block mb-1 text-sm font-medium text-gray-800 dark:text-neutral-200">Zoom</label>
                                    <input id="profileZoom" type="range" min="0.5" max="3" value="1" step="0.01" class="w-full">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div>
                                        <label for="profileOffsetX" class="block mb-1 text-sm font-medium text-gray-800 dark:text-neutral-200">Move X</label>
                                        <input id="profileOffsetX" type="range" min="-160" max="160" value="0" step="1" class="w-full">
                                    </div>
                                    <div>
                                        <label for="profileOffsetY" class="block mb-1 text-sm font-medium text-gray-800 dark:text-neutral-200">Move Y</label>
                                        <input id="profileOffsetY" type="range" min="-160" max="160" value="0" step="1" class="w-full">
                                    </div>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button type="button" id="rotateLeft" class="px-3 py-2 rounded-lg bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-white">Rotate Left</button>
                                    <button type="button" id="rotateRight" class="px-3 py-2 rounded-lg bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-white">Rotate Right</button>
                                    <button type="button" id="resetCrop" class="px-3 py-2 rounded-lg bg-gray-200 text-gray-800 dark:bg-gray-700 dark:text-white">Reset</button>
                                    <button type="button" id="applyCrop" class="px-3 py-2 rounded-lg bg-blue-600 text-white">Use This Image</button>
                                </div>
                                <p class="text-sm text-gray-500 dark:text-neutral-400">Adjust the image, then click Use This Image before saving changes.</p>
                            </div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="mt-5 flex justify-end gap-x-2">
                       <button type="submit" class="overflow-hidden relative w-32 p-2 h-12 bg-white dark:bg-black text-black dark:text-white border-none rounded-md text-xl font-bold cursor-pointer z-10 group">
                            Update
                            <span class="absolute w-36 h-32 -top-8 -left-2 bg-blue-200 rounded-full transform scale-x-0 group-hover:scale-x-100 transition-transform group-hover:duration-500 duration-1000 origin-bottom"></span>
                            <span class="absolute w-36 h-32 -top-8 -left-2 bg-blue-400 rounded-full transform scale-x-0 group-hover:scale-x-100 transition-transform group-hover:duration-700 duration-700 origin-bottom"></span>
                            <span class="absolute w-36 h-32 -top-8 -left-2 bg-blue-600 rounded-full transform scale-x-0 group-hover:scale-x-100 transition-transform group-hover:duration-1000 duration-500 origin-bottom"></span>
                            <span class="group-hover:opacity-100 group-hover:duration-1000 duration-100 opacity-0 absolute top-2.5 left-6 z-10">Submit</span>
                        </button>
                    </div>
                
                </form>
        </div>
    </div>
</div>

<script>
    console.log("profile page");

    // Highlight the active sidebar link
    function highlightActiveSidebarLink() {
        const currentPath = window.location.pathname;
        const sidebarLinks = document.querySelectorAll('.sidebar-link');
        
        sidebarLinks.forEach(link => {
            link.classList.remove('bg-blue-500', 'tracking-widest', 'font-semibold', 'text-white');
            const href = link.getAttribute('data-th-href') || link.getAttribute('href');
            if (href && currentPath.includes(href.replace(/[{}]/g, '').split('(')[0])) {
                link.classList.add('bg-blue-500', 'tracking-widest', 'font-semibold', 'text-white', 'dark:text-white');
            }
        });
    }

    // Call on page load
    document.addEventListener('DOMContentLoaded', highlightActiveSidebarLink);

    // Ensure gender fields are always enabled for all users (including OAuth users)
    const genderRadios = document.querySelectorAll('input[name="gender"]');
    genderRadios.forEach(radio => {
        radio.removeAttribute('disabled');
        radio.style.pointerEvents = 'auto';
        radio.style.opacity = '1';
    });

    // Ensure the labels are also clickable
    const genderLabels = document.querySelectorAll('label[for^="af-account-gender-checkbox"]');
    genderLabels.forEach(label => {
        label.style.pointerEvents = 'auto';
        label.style.opacity = '1';
        label.classList.remove('disabled:opacity-50', 'disabled:pointer-events-none');
    });

    const profileInput = document.querySelector("#profilePic");
    const profilePreview = document.querySelector("img[alt='Profile Pic']");
    const cropPanel = document.querySelector("#profileCropPanel");
    const canvas = document.querySelector("#profileCropCanvas");
    const zoomInput = document.querySelector("#profileZoom");
    const offsetXInput = document.querySelector("#profileOffsetX");
    const offsetYInput = document.querySelector("#profileOffsetY");
    const rotateLeftBtn = document.querySelector("#rotateLeft");
    const rotateRightBtn = document.querySelector("#rotateRight");
    const resetCropBtn = document.querySelector("#resetCrop");
    const applyCropBtn = document.querySelector("#applyCrop");
    const ctx = canvas ? canvas.getContext("2d") : null;

    let cropImage = null;
    let cropFileName = "profile.png";
    let rotation = 0;

    function drawProfileCrop() {
        if (!ctx || !cropImage) return;
        const size = canvas.width;
        const zoom = Number(zoomInput.value);
        const offsetX = Number(offsetXInput.value);
        const offsetY = Number(offsetYInput.value);

        ctx.clearRect(0, 0, size, size);
        ctx.fillStyle = "#111827";
        ctx.fillRect(0, 0, size, size);
        ctx.save();
        ctx.translate(size / 2 + offsetX, size / 2 + offsetY);
        ctx.rotate((rotation * Math.PI) / 180);

        const rotated = Math.abs(rotation % 180) === 90;
        const sourceWidth = rotated ? cropImage.height : cropImage.width;
        const sourceHeight = rotated ? cropImage.width : cropImage.height;
        const scale = Math.max(size / sourceWidth, size / sourceHeight) * zoom;
        const drawWidth = cropImage.width * scale;
        const drawHeight = cropImage.height * scale;
        ctx.drawImage(cropImage, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        ctx.restore();
    }

    function resetProfileCrop() {
        rotation = 0;
        zoomInput.value = "1";
        offsetXInput.value = "0";
        offsetYInput.value = "0";
        drawProfileCrop();
    }

    if (profileInput && cropPanel && canvas) {
        profileInput.addEventListener("change", (event) => {
            const file = event.target.files && event.target.files[0];
            if (!file) return;
            cropFileName = file.name || "profile.png";
            const reader = new FileReader();
            reader.onload = () => {
                cropImage = new Image();
                cropImage.onload = () => {
                    cropPanel.classList.remove("hidden");
                    resetProfileCrop();
                };
                cropImage.src = reader.result;
            };
            reader.readAsDataURL(file);
        });

        [zoomInput, offsetXInput, offsetYInput].forEach((input) => input.addEventListener("input", drawProfileCrop));
        rotateLeftBtn.addEventListener("click", () => {
            rotation = (rotation - 90 + 360) % 360;
            drawProfileCrop();
        });
        rotateRightBtn.addEventListener("click", () => {
            rotation = (rotation + 90) % 360;
            drawProfileCrop();
        });
        resetCropBtn.addEventListener("click", resetProfileCrop);
        applyCropBtn.addEventListener("click", () => {
            canvas.toBlob((blob) => {
                if (!blob) return;
                const file = new File([blob], cropFileName.replace(/\.[^.]+$/, "") + ".png", { type: "image/png" });
                const transfer = new DataTransfer();
                transfer.items.add(file);
                profileInput.files = transfer.files;
                const previewUrl = URL.createObjectURL(blob);
                if (profilePreview) profilePreview.src = previewUrl;
            }, "image/png", 0.92);
        });
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>
</html>
