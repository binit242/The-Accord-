<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
  lang="en"
  th:replace="~{base :: parent(~{::#content},~{::title},~{::script})}"
>
  <head>
    <title data-th-text="${loggedInUser.name}+' |  Dashboard'">
      Profile Page
    </title>
  </head>
  <body>
    <div id="content">
      <!-- sidebar -->
      <div th:if="${loggedInUser}">
        <div data-th-replace="~{user/sidebar :: sidebar}"></div>
      </div>

     <!-- Card Blog -->
<div class="max-w-[85rem] mt-14 px-4 py-10 sm:px-6 lg:px-8 lg:py-14 mx-auto">
  <!-- Title -->
  <div class="max-w-2xl mx-auto text-center mb-10 lg:mb-14">
    <h2 class="text-2xl font-bold md:text-4xl md:leading-tight dark:text-white">Dashboard</h2>
    <p class="mt-1 text-gray-600 dark:text-neutral-400">Welcome to your utility page, see an overview of your actions.</p>
  </div>
  <!-- End Title -->

  <!-- Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Main Card (Recently Added) -->
    <div class="group lg:col-span-3 lg:row-span-2 flex flex-col focus:outline-hidden rounded-3xl overflow-hidden">
      <div class="relative overflow-x-auto sm:rounded-3xl shadow-lg">
        <!-- Header -->
        <div class="px-4 sm:px-6 py-4 border-b border-gray-200 dark:border-neutral-700 rounded-t-3xl bg-white dark:bg-gray-800 shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1),0_2px_1px_rgba(0,0,0,0.06),0_4px_2px_rgba(0,0,0,0.09),0_8px_4px_rgba(0,0,0,0.09),0_16px_8px_rgba(0,0,0,0.09),0_32px_16px_rgba(0,0,0,0.09)] dark:bg-gray-800 dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05),0_2px_1px_rgba(255,255,255,0.1),0_4px_2px_rgba(255,255,255,0.07),0_8px_4px_rgba(255,255,255,0.06),0_16px_8px_rgba(255,255,255,0.05),0_32px_16px_rgba(255,255,255,0.04)]">
          <h2 class="text-xl sm:text-3xl font-semibold text-gray-800 dark:text-neutral-200">
            Favourite Contacts
          </h2>
        </div>
        <!-- End Header -->

        <div class="relative overflow-x-auto shadow-md sm:rounded-b-3xl">
         <table class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400 rounded-b-3xl overflow-hidden">
    <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400 rounded-t-3xl">
        <tr>
            <th scope="col" class="px-4 mx-5 sm:px-6 py-3">Contact Name</th>
            <th scope="col" class="px-4 mx-5 sm:px-6 py-3">Phone</th>
            <th scope="col" class="px-4 mx-5 sm:px-6 py-3">Actions</th>
        </tr>
    </thead>
    <tbody>
        <!-- Loop through favorite contacts -->
        <tr th:each="contact : ${favoriteContacts}" class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-[#cfe8ff] dark:hover:bg-[#1e3a8a] transition-colors duration-300 rounded-lg">
            <!-- Name -->
            <td scope="row" class="flex items-center px-4 sm:px-6 py-4 text-gray-900 whitespace-nowrap dark:text-white rounded-lg">
                <img th:src="${contact.picture}" class="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-cover overflow-hidden" alt="Profile image" />
                <div class="ps-3">
                    <div class="text-sm sm:text-base font-semibold" th:text="${contact.name}"></div>
                    <div class="text-xs sm:text-sm font-normal text-gray-500" th:text="${contact.email}"></div>
                </div>
            </td>

            <!-- Phone -->
            <td class="px-4 sm:px-6 py-4">
                <i class="fa-solid fa-phone w-3 h-3 sm:w-4 sm:h-4"></i>
                <span class="text-xs sm:text-sm" th:text="${contact.phoneNumber}"></span>
            </td>

            <!-- Actions -->
            <td class="px-4 sm:px-6 py-4">
                <div class="flex gap-x-1 md:gap-x-2 -ml-2">
                    <!-- Delete -->
                    <a th:href="@{/user/contacts/delete/{id}(id=${contact.id})}" class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full hover:shadow-[inset_0_0_12px_#3b82f6] text-gray-400">
                        <i class="fa-solid fa-trash text-xs sm:text-sm"></i>
                    </a>
                    
                    <!-- Edit -->
                    <a th:href="@{/user/contacts/view/{id}(id=${contact.id})}" class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full hover:shadow-[inset_0_0_12px_#3b82f6] text-gray-400">
                        <i class="fa-solid fa-pen text-xs sm:text-sm"></i>
                    </a>
                    
                    <!-- View -->
                    <a data-th-href="@{'/user/contacts'}" class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full hover:shadow-[inset_0_0_12px_#3b82f6] text-gray-400">
                        <i class="fa-solid fa-eye text-xs sm:text-sm"></i>
                    </a>
                </div>
            </td>
        </tr>
        
    </tbody>
</table>
        </div>
      </div>
    </div>
    <!-- End Main Card -->

    <!-- Profile Card -->
    <div class="group flex col-span-1 row-span-1 flex-col focus:outline-hidden">
      <div class="w-full p-5 [perspective:1000px]">
        <div class="relative w-full pt-[50px] border-4 border-white rounded-[2rem] 
                  [transform-style:preserve-3d] transition-all duration-500 ease-in-out
                  bg-[linear-gradient(135deg,#0000_18.75%,#f3f3f3_0_31.25%,#0000_0),repeating-linear-gradient(45deg,#f3f3f3_-6.25%_6.25%,#ffffff_0_18.75%)]
                  bg-[#f0f0f0] bg-[length:60px_60px] bg-[position:0_0] 
                  shadow-[0_30px_30px_-10px_rgba(142,142,142,0.3)]
                  hover:bg-[position:-100px_100px] hover:[transform:rotate3d(0.5,1,0,30deg)]">

          <div class="bg-cyan-400/80 dark:bg-cyan-800/80 px-4 sm:px-6 pt-[60px] pb-6 rounded-[2rem] rounded-br-[2rem] transition-all duration-500 ease-in-out [transform-style:preserve-3d] text-center shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1)] dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05)]">
            
            <span data-th-text="${loggedInUser.name}" class="inline-block text-white text-lg sm:text-[25px] font-black transition-all duration-500 ease-in-out [transform:translate3d(0px,0px,50px)] hover:[transform:translate3d(0px,0px,60px)]">
              Name
            </span>

            <p data-th-text="${loggedInUser.email}" class="mt-2 text-xs font-bold text-gray-100 transition-all duration-500 ease-in-out [transform:translate3d(0px,0px,30px)] hover:[transform:translate3d(0px,0px,60px)]">
              email@gmail.com
            </p>

            <p data-th-text="${loggedInUser.PhoneNumber}" class="mt-2 text-xs font-bold text-gray-100 transition-all duration-500 ease-in-out [transform:translate3d(0px,0px,30px)] hover:[transform:translate3d(0px,0px,60px)]">
              73479256498
            </p>

            <a th:href="@{/user/profile}" class="mt-4 inline-block cursor-pointer text-[9px] font-black uppercase text-cyan-500 dark:text-cyan-800 bg-white px-3 py-2 rounded-full transition-all duration-500 ease-in-out [transform:translate3d(0px,0px,20px)] hover:[transform:translate3d(0px,0px,60px)]">
              See More
            </a>
          </div>

          <div class="absolute top-[30px] right-[30px] sm:right-[85px] h-[80px] w-[80px] sm:h-[70px] sm:w-[75px] rounded-[1.5rem] shadow-[0_17px_10px_-10px_rgba(100,100,111,0.2)] [transform:translate3d(0px,0px,80px)]">
  <img th:src="${loggedInUser.displayProfilePic}" src="/images/default-avatar.svg" onerror="this.onerror=null; this.src='/images/default-avatar.svg';" class="w-full h-full object-cover rounded-[1.5rem] overflow-hidden" />
          </div>

        </div>
      </div>
    </div>
    <!-- End Profile Card -->

    <!-- Stats Cards -->
    <!-- Contacts Card -->
    <div class="col-span-1 row-span-2 sm:col-span-1 hidden lg:flex lg:col-span-1 items-center justify-center">
  <a data-th-href="@{'/user/contacts/add'}" class="w-full h-full rounded-[50px] bg-[#DFE1EB] hover:tracking-widest transition-all duration-200 ease-in-out shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1)] 
              dark:bg-gray-800 dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05)]
              flex flex-col items-center justify-center text-gray-800 dark:text-white text-center">
    <i class="fa-solid fa-plus text-4xl mb-2 hover:-rotate-180 transition-all duration-500 ease-in-out"></i>
    <span class="text-lg font-semibold">Add Contact</span>
    </a>
</div>


    <!-- Favorites Card -->
    <div class="col-span-1 sm:col-span-1 lg:mt-5 scale-75 md:scale-100 sm:mt-5 lg:col-span-1 flex items-center justify-center">
     <div
    class="group relative overflow-hidden bg-[#DCDFE4] dark:bg-gray-800 scale-125  rounded-3xl p-4 font-mono text-white duration-300 cursor-pointer
           h-56 w-56 hover:scale-100 hover:bg-gradient-to-br hover:from-[#BFDBFE] hover:to-[#CBD5E1] hover:dark:from-[#5EEAD4] hover:dark:to-[#64748B]
           flex flex-col text-center shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1)] 
           dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05)]"
  >
    <h3 class="text-xl mb-5 text-black dark:text-white">Favourite</h3>
    <div class="relative">
      <h4 class="absolute left-1/2 top-1/2 -translate-x-1/2 translate-y-8 text-5xl font-sans duration-300 group-hover:-translate-x-3 group-hover:-translate-y-2 group-hover:scale-150 text-black dark:text-white">
        <span th:text="${favoriteCount}"></span>
      </h4>
    </div>
    <div class="absolute top-36 -left-36 mt-2 duration-300 group-hover:left-14 text-black dark:text-white">
      <p class="text-sm">Your favourite</p>
      <p class="text-sm">Contacts</p>
    </div>
  </div>
    </div>

    <!-- Socials Card -->
    <div class="col-span-1 sm:col-span-1 scale-75 md:scale-100 lg:mt-5 lg:col-span-1 flex items-center justify-center">
      <div
    class="group relative overflow-hidden bg-[#DCDFE4] dark:bg-gray-800 scale-125 h-56 w-56 rounded-3xl p-4 font-mono text-white duration-300 cursor-pointer
            hover:scale-100 hover:bg-gradient-to-br hover:from-[#D1FAE5] hover:to-[#93C5FD] hover:dark:from-[#1F2937] hover:dark:to-[#3B82F6]
           flex flex-col text-center shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1)] 
           dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05)]"
  >
    <h3 class="text-xl mb-5 text-black dark:text-white">Socials</h3>
    <div class="relative">
      <h4 class="absolute left-1/2 top-1/2 -translate-x-1/2 translate-y-8 text-5xl font-sans duration-300 group-hover:-translate-x-5 group-hover:-translate-y-2 group-hover:scale-150 text-black dark:text-white">
        <span th:text="${socialLinkCount}"></span>
      </h4>
    </div>
    <div class="absolute top-36 -left-32 mt-2 duration-300 group-hover:left-16 text-black dark:text-white">
      <p class="text-sm">Contacts with</p>
      <p class="text-sm">social links</p>
    </div>
  </div>
    </div>

    <div class="col-span-1 scale-75 md:scale-100 sm:col-span-1 lg:mt-5 lg:col-span-1 flex items-center justify-center">
      <div
    class="group relative overflow-hidden bg-[#DCDFE4] dark:bg-gray-800 scale-125 h-56 w-56 rounded-3xl p-4 font-mono text-white duration-300 cursor-pointer
            hover:scale-100 hover:bg-gradient-to-br hover:from-[#E9D5FF] hover:to-[#A5B4FC] hover:dark:from-[#312E81] hover:dark:to-[#6366F1]
           flex flex-col text-center 
           shadow-[inset_0_-23px_25px_rgba(0,0,0,0.17),inset_0_-36px_30px_rgba(0,0,0,0.15),inset_0_-79px_40px_rgba(0,0,0,0.1)] 
           dark:shadow-[inset_0_-23px_25px_rgba(255,255,255,0.15),inset_0_-36px_30px_rgba(255,255,255,0.1),inset_0_-79px_40px_rgba(255,255,255,0.05)]"
  >
    <h3 class="text-xl mb-5 text-black dark:text-white">Contacts</h3>
    <div class="relative">
      <h4 class="absolute left-1/2 top-1/2 -translate-x-1/2 translate-y-8 text-5xl font-sans duration-300 group-hover:-translate-x-3 group-hover:-translate-y-2 group-hover:scale-150 text-black dark:text-white">
        <span th:text="${totalContactCount}"></span>
      </h4>
    </div>
    <div class="absolute top-36 -left-32 mt-2 duration-300 group-hover:left-20 text-black dark:text-white">
      <p class="text-sm">Number of</p>
      <p class="text-sm">Contacts</p>
    </div>
  </div>
    </div>
    <!-- End Stats Cards -->
  </div>
  <!-- End Grid -->
</div>
<!-- End Card Blog -->

<div data-th-replace="~{ user/contact_modals :: contact}"></div>

    </div>

    <script>
      console.log("this is profile page");
      // Sync the checkbox switch input with theme
const themeCheckbox = document.querySelector('#switch');

// Update theme when checkbox is toggled
if (themeCheckbox) {
    themeCheckbox.addEventListener('change', () => {
        const oldTheme = currentTheme;
        currentTheme = themeCheckbox.checked ? 'dark' : 'light';

        // Update the HTML tag
        document.querySelector('html').classList.remove(oldTheme);
        document.querySelector('html').classList.add(currentTheme);

        // Save new theme
        setTheme(currentTheme);
    });

    // Set the checkbox state on page load
    themeCheckbox.checked = currentTheme === 'dark';
}

    </script>
  </body>
</html>
