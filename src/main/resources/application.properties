spring.application.name=scm2.0
spring.config.import=optional:file:./local-secrets.properties

server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:scm20}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cloudinary.cloud.name=${CLOUDINARY_NAME:demo}
cloudinary.api.key=${CLOUDINARY_API_KEY:demo}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:demo}

spring.mail.host=${EMAIL_HOST:smtp.gmail.com}
spring.mail.port=${EMAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.oauth.enabled=${APP_OAUTH_ENABLED:false}
app.oauth.google.client-id=${APP_OAUTH_GOOGLE_CLIENT_ID:}
app.oauth.google.client-secret=${APP_OAUTH_GOOGLE_CLIENT_SECRET:}
app.oauth.github.client-id=${APP_OAUTH_GITHUB_CLIENT_ID:}
app.oauth.github.client-secret=${APP_OAUTH_GITHUB_CLIENT_SECRET:}
